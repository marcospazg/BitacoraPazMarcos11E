<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitácora Marcos Paz</title>
    <link rel="icon" type="image/png" href="recursos/IMG/LogTec.png" />
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            background-color: #0E4EB2;
            color: #001D39
        }

        body {
            display: flex;
            flex-direction: column;
            text-align: center;

        }

        header {
            padding: 30px;
            background-color: #000521;
            color: #2078cf;
        }

        header h1 {
            text-shadow: 0 0 5px #2078cf, 0 0 15px #2078cf, 0 0 20px #2078cf;
            margin: 0;
        }

        main {
            flex: 1;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .semana {
            background-color: #011F65;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 25px;
            margin: 25px auto;
            max-width: 700px;
            border-left: 6px solid #2078CF; 
            text-align: left;
        }
        .semana h3 {
            color: #2078CF; 
            margin-top: 0;
        }

        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20x 50px;
            background-color: #020C47;
            color: #2078CF;
        }
        footer img {
            transition: transform 0.3s ease;
            filter: brightness(1.2);
        }
        footer img:hover {
            transform: scale(1.15);
        }

        @media screen and (max-width: 600px) {
            footer {
                flex-direction: column;
                gap: 15px;
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Bitácora Segunda y Tercera Unidad</h1>
    </header>
    <main>
        <h4 style="color: #0A4174;">Contenido Página WEB</h4>
        
        <div class="semana">
            <h3>Semana 1: Introducción a Arduino</h3>
            <p>En esta semana realizamos un PDF que nos introdujo al tema de Arduino.</p>
            <embed src="arduinopdf.pdf" type="application/pdf" width="100%" height="400px" style="max-width: 100%;"/>
            <p style="font-size: 0.8em; margin-top: 10px;">
            <a href="arduinopdf.pdf" target="_blank">
            </a>
            </p>
        </div>

        <div class="semana">
            <h3>Semana 2: Modificaciones con la IA a mi CSS</h3>
            <p>Video de la Programación: <strong>PROGRA LED MAPG</strong></p>
            <video controls>
            <source src="PROGRA LED MAPG.mp4" type="video/mp4" width="100%" height="400px" style="max-width: 100%;"/>
            </video>
        </div>
    </main>
    <footer> 
        <span>2026 Marcos Paz</span>
        <img src="https://www.capouilliez.edu.gt/assets/img/logo.png" height="50px" width="200px" />
    </footer>
</body>
</html>
